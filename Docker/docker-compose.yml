version: "3.9"

# Build context is the project root (one level up from this file).
# Run from the Docker/ directory:
#   docker compose up --build
# Or from the project root:
#   docker compose -f Docker/docker-compose.yml up --build

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    image: careconnect:latest
    container_name: careconnect-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      # Persist the SQLite database across container restarts
      - db_data:/app/data/db
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  frontend:
    image: careconnect:latest   # reuses the image built by the api service above
    container_name: careconnect-frontend
    command: >
      streamlit run src/frontend/app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --server.enableCORS false
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      # Falls back to the container-network address when API_BASE_URL is not
      # set in .env, overriding the 127.0.0.1 default baked into Streamlit.
      - API_BASE_URL=${API_BASE_URL:-http://api:8000/api/v1}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    driver: local
